# Theme Settings Configuration File
##
### use settings.yml file for configure colors, ui, rtl, sidebar, animation options

### Main Settings
settings:
  skin: "light" # select initial skin option: "light" or "dark"

### Preloader
preloader:
  logo:
    image: "assets/img/profile.png"
    alt: "Harrison Abbot"

### Header
header:
  logo:
    image: "assets/img/logo2.png"
    alt: "Harrison Abbot"

### Social
social:
  - title: "GitHub"
    icon: "fab fa-github"
    url: "https://github.com/hjabbot"

  - title: "LinkedIn"
    icon: "fab fa-linkedin"
    url: "https://linkedin.com"

  - title: "email"
    icon: "fa fa-envelope"
    url: "mailto:h.j.abbot@gmail.com"

### Footer
footer:
  developer: "Developed by <strong>bslthemes</strong>"
  copyright: "<strong>Luique</strong>. All rights reserved"

### Portfolio Filters Settings
portfolio:
  layout: "list" # select works layout options: "Grid" or "List"
  filters:
    - name: "UI UX Design"
      slug: "ui-ux-design"

    - name: "Photography"
      slug: "photography"

    - name: "Development"
      slug: "development"

    - name: "Branding"
      slug: "branding"
